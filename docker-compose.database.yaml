name: 'Database'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-node1
    hostname: oracle-node1
    ports:
      - "1521:1521"
    environment:
      TZ: America/Sao_Paulo
      ORACLE_PASSWORD: adm
      APP_USER: TEMPLATE_ADM
      APP_USER_PASSWORD: adm
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./infra/oracle:/container-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          cpus: "5"
          memory: "4G"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 40

volumes:
  postgres_data:
  oracle_data: