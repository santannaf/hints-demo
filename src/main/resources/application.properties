spring.application.name=hints
spring.threads.virtual.enabled=true
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/demo?currentSchema=posts
spring.datasource.username=demo
spring.datasource.password=demo
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10

# JPA
spring.jpa.open-in-view=false

# Spring Actuator Management
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=ping
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=metrics,info,health,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.instance.name=${INSTANCE_NAME:my-instance-name}
management.metrics.tags.instance.ip=${INSTANCE_IP:my-instance-ip}
management.metrics.tags.env=${ENV:local}
management.metrics.tags.server=${SERVER:onPremise}
management.metrics.tags.team=my_team
management.metrics.tags.service.name=${spring.application.name}
management.metrics.distribution.slo.http=125ms,500ms,2s,8s
management.metrics.distribution.minimum-expected-value.http.server.requests]=125ms
management.metrics.distribution.maximum-expected-value.http.server.requests]=8s
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.opentelemetry.resource-attributes.cluster=local
management.opentelemetry.resource-attributes.deployment.environment=${ENV:local}
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.otlp.metrics.export.aggregation-temporality=cumulative
management.otlp.metrics.export.histogram-flavor=explicit-bucket-histogram
management.otlp.metrics.export.step=20s
management.otlp.metrics.export.base-time-unit=milliseconds
management.opentelemetry.tracing.export.otlp.transport=http
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
management.tracing.sampling.probability=1.0

# Kafka Configurations
kafka.arch.common.bootstrap-servers=localhost:29092
kafka.arch.common.schema-registry=http://localhost:8081
kafka.arch.producer.ack-producer-config=all
kafka.arch.producer.compress-type=snappy
kafka.arch.producer.type-partitioner=UniformStickyPartitioner
kafka.arch.consumer.consumer-group-id=hints-consumer-group
kafka.arch.consumer.ack-consumer-config=manual
kafka.arch.consumer.event-auto-offset-reset-config=latest
kafka.arch.consumer.enable-avro-reader-config=false
kafka.arch.common.enable-connection-ssl-protocol-mode=false
kafka.topic.posts=posts
